name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run API tests
        run: ./gradlew clean apiTests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

      - name: Print failed tests
        if: always()
        run: |
          find build/test-results -name "*.xml" | xargs grep -l "failures=\"[^0]\"" | xargs cat

      - name: Upload Allure results (API)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: build/allure-results
          retention-days: 7

  ui-tests:
    name: UI Tests (Headless Chrome)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run UI tests (headless)
        run: ./gradlew uiTests -Pbrowser=chrome -Pheadless=true

      - name: Upload Allure results (UI)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-ui
          path: build/allure-results
          retention-days: 7

  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [ api-tests, ui-tests ]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results
        continue-on-error: true

      - name: Download UI results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results
        continue-on-error: true

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report